<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Le Carnet des Gagnants</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/animations.css">

</head>

<body>

<div class="background">

    <div class="light"></div>

    <main class="book">

        <!-- Pages -->

        <div class="book-pages">

            <div class="book-page page-1"></div>
            <div class="book-page page-2"></div>
            <div class="book-page page-3"></div>

        </div>

        <!-- Tranche -->

        <div class="book-spine"></div>

        <!-- Couverture -->

        <section class="book-cover">
                <!-- Logo -->
                <div class="cover-header">               

                    <!-- Titre -->

                    <h1 class="book-title">

                        <span>Le Carnet</span>
                        <span>des Gagnants</span>

                    </h1>            

                    <div class="separator"></div>
                </div>
                <div class="separator"></div>

                <!-- Formulaire -->

                <form id="loginForm" class="login-form">
                    <div class="login-fields">
                        <div class="login-field">

                            <i class="bi bi-person"></i>

                            <input
                                id="username"
                                type="text"
                                placeholder="Utilisateur"
                                autocomplete="username">

                        </div>

                        <div class="login-field">

                            <i class="bi bi-lock"></i>

                            <input
                                id="password"
                                type="password"
                                placeholder="Mot de passe"
                                autocomplete="current-password">

                        </div>
                    </div>
                    <div id="loginMessage" class="login-message"></div>
                    <!-- Citation -->

                    <p class="book-quote">

                        « Je travaille sur la personne que je veux devenir,
                        plutôt que sur celle que je suis. »

                    </p>
                    <button
                        id="openBookButton"
                        class="login-button"
                        type="submit">

                        Ouvrir le carnet

                    </button>

                </form>            
        </section>

    </main>

</div>

<script src="../js/login.js"></script>

</body>

</html>
