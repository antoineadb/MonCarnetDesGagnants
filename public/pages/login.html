<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Le Carnet des Gagnants</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/animations.css">

</head>

<body>

<div class="background">

    <div class="light"></div>

    <main class="book">

        <!-- Pages -->

        <div class="book-pages">

            <div class="book-page page-1"></div>
            <div class="book-page page-2"></div>
            <div class="book-page page-3"></div>

        </div>

        <!-- Tranche -->

        <div class="book-spine"></div>

        <!-- Couverture -->

        <section class="book-cover">

            <!-- Logo -->

            <div class="book-logo">

                <div class="book-logo__circle">
                    CG
                </div>

            </div>

            <!-- Titre -->

            <h1 class="book-title">

                Le Carnet
                <br>
                <span>des Gagnants</span>

            </h1>

            <div class="separator"></div>

            <!-- Citation -->

            <p class="book-quote">

                « Je travaille sur la personne que je veux devenir,
                plutôt que sur celle que je suis. »

            </p>

            <div class="separator"></div>

            <!-- Formulaire -->

            <form id="loginForm" class="login-form">

                <div class="login-field">

                    <i class="bi bi-person"></i>

                    <input
                        type="text"
                        placeholder="Utilisateur"
                        autocomplete="username">

                </div>

                <div class="login-field">

                    <i class="bi bi-lock"></i>

                    <input
                        type="password"
                        placeholder="Mot de passe"
                        autocomplete="current-password">

                </div>

                <button
                    id="openBookButton"
                    class="login-button"
                    type="submit">

                    Ouvrir mon carnet →

                </button>

            </form>

        </section>

    </main>

</div>

<script src="../js/login.js"></script>

</body>

</html>
