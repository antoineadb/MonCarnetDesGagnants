<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Historique du Journal</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="../css/journal-history.css">

</head>

<body>

<div class="history-page">

    <header class="history-header">

        <button id="btnRetour">

            <i class="bi bi-arrow-left"></i>

            Retour

        </button>

        <div>

            <h1>📚 Historique du Journal</h1>

            <p id="journalStats">

                Chargement...

            </p>

        </div>

    </header>

    <section class="history-toolbar">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Rechercher une note...">

        <select id="sortOrder">

            <option value="desc">
                Plus récent
            </option>

            <option value="asc">
                Plus ancien
            </option>

        </select>

    </section>

    <section id="historyContainer">

    </section>

</div>
<!-- =======================================================
     MODAL
======================================================== -->

<div id="noteModal" class="modal">

    <div class="modal-content">

        <span id="closeModal">&times;</span>

        <h2 id="modalTitle"></h2>

        <p id="modalDate"></p>

        <div id="modalContent"></div>

        <div class="modal-actions">

            <button id="editNote">

                <i class="bi bi-pencil-square"></i>

                Modifier

            </button>

            <button id="deleteNote">

                <i class="bi bi-trash"></i>

                Supprimer

            </button>

        </div>

    </div>

</div>

<script src="../js/journal-history.js"></script>

</body>

</html>
