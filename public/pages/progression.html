<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ma progression</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="../css/progression.css">

</head>

<body>

<div class="back-button">
    <a href="app.html">
    ← Retour au carnet
    </a>
</div>
<div class="progression-page">

    <header>

        <h1>

            📈 Ma Progression

        </h1>

        <p>

            Chaque petite action quotidienne construit ton potentiel.

        </p>

    </header>
    <section class="graph-container">

        <canvas
            id="progressCanvas"
            width="1200"
            height="650">
        </canvas>

        <div id="rotate-device">

            <i class="bi bi-phone-landscape rotate-icon"></i>

            <h2>Tournez votre téléphone</h2>

            <p>
                La visualisation de votre progression est optimisée
                pour le mode paysage.
            </p>

        </div>

    </section>

    <section
        id="progression-editor"
        class="progression-editor hidden">

        <div class="editor-header">

            <div id="editor-icon">
                🍎
            </div>

            <div class="editor-title">

                <h2 id="editor-title">
                    Santé
                </h2>

                <p id="editor-description">
                    Description...
                </p>

            </div>

        </div>

        <div class="editor-score">

            <span>
                Score actuel
            </span>

            <strong id="editor-value">
                72%
            </strong>

        </div>

        <input
            id="editor-slider"
            type="range"
            min="0"
            max="100"
            value="72">

        <div class="editor-actions">

            <button id="editor-save">

                💾 Enregistrer

            </button>

        </div>

    </section>

    <footer class="chapter-footer">

        <span class="chapter-book">
            Le Carnet des Gagnants
        </span>

        <span class="chapter-page-number">
            Page 4
        </span>

    </footer>
   

</div>

<script src="../js/navigation.js"></script>

<script src="../js/progression-service.js"></script>

<script src="../js/models/Path.js"></script>

<script src="../js/models/Milestone.js"></script>

<script src="../js/models/progressionModel.js"></script>

<script src="../js/core/CanvasUI.js"></script>

<script src="../js/core/CanvasComponent.js"></script>

<script src="../js/editors/ProgressionEditor.js"></script>

<script src="../js/progression/GrowthCurve.js"></script>

<script src="../js/progression.js"></script>

</body>

</html>
